<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#F1EBE0"/>
  <!-- Decorative Grid -->
  <g stroke="#2B211A" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="400" />
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="250" y1="0" x2="250" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="350" x2="400" y2="350" />
  </g>
  
  <!-- Server stack 1 -->
  <rect x="90" y="100" width="100" height="40" rx="6" fill="#EAE3D5" stroke="#2B211A" stroke-width="2" />
  <circle cx="115" cy="120" r="4" fill="#7C9BB0" />
  <line x1="135" y1="120" x2="170" y2="120" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" />
  
  <!-- Server stack 2 -->
  <rect x="90" y="160" width="100" height="40" rx="6" fill="#EAE3D5" stroke="#2B211A" stroke-width="2" />
  <circle cx="115" cy="180" r="4" fill="#7C9BB0" />
  <line x1="135" y1="180" x2="170" y2="180" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" />

  <!-- Server stack 3 -->
  <rect x="90" y="220" width="100" height="40" rx="6" fill="#EAE3D5" stroke="#2B211A" stroke-width="2" />
  <circle cx="115" cy="240" r="4" fill="#2B211A" fill-opacity="0.5" />
  <line x1="135" y1="240" x2="170" y2="240" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" />
  
  <!-- Connection node flow -->
  <path d="M 190,180 C 240,180 230,220 270,220" stroke="#7C9BB0" stroke-width="3" stroke-linecap="round" />
  <path d="M 190,120 C 240,120 230,220 270,220" stroke="#7C9BB0" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" />
  
  <!-- Database Cylinder representation -->
  <path d="M 270,180 C 270,170 330,170 330,180 L 330,250 C 330,260 270,260 270,250 Z" fill="#7C9BB0" fill-opacity="0.2" stroke="#7C9BB0" stroke-width="2" />
  <path d="M 270,180 C 270,190 330,190 330,180" fill="none" stroke="#7C9BB0" stroke-width="2" />
  <path d="M 270,200 C 270,210 330,210 330,200" fill="none" stroke="#7C9BB0" stroke-width="2" stroke-opacity="0.7" />
  <path d="M 270,220 C 270,230 330,230 330,220" fill="none" stroke="#7C9BB0" stroke-width="2" stroke-opacity="0.7" />
</svg>
