<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#F1EBE0"/>
  <!-- Decorative Grid -->
  <g stroke="#2B211A" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="400" />
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="250" y1="0" x2="250" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="0" y1="300" x2="400" y2="300" />
    <line x1="0" y1="350" x2="400" y2="350" />
  </g>
  <!-- Document Representation -->
  <rect x="80" y="80" width="120" height="160" rx="8" fill="#EAE3D5" stroke="#2B211A" stroke-width="2" />
  <!-- Document Lines -->
  <line x1="100" y1="120" x2="180" y2="120" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="100" y1="140" x2="160" y2="140" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="100" y1="160" x2="180" y2="160" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="100" y1="180" x2="140" y2="180" stroke="#2B211A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  
  <!-- Connecting nodes representing pipeline -->
  <path d="M 200,160 C 260,160 240,240 300,240" stroke="#7C9BB0" stroke-width="3" stroke-dasharray="4,4" />
  
  <!-- AI/ML Process Box -->
  <rect x="230" y="200" width="100" height="80" rx="12" fill="#7C9BB0" fill-opacity="0.15" stroke="#7C9BB0" stroke-width="2" />
  <circle cx="280" cy="240" r="16" fill="#7C9BB0" />
  <circle cx="280" cy="240" r="8" fill="#F1EBE0" />
  <circle cx="280" cy="240" r="2" fill="#7C9BB0" />
  
  <!-- Sparkles/Stars for AI -->
  <path d="M 170,90 L 175,100 L 185,105 L 175,110 L 170,120 L 165,110 L 155,105 L 165,100 Z" fill="#7C9BB0" />
  <path d="M 290,140 L 292,145 L 297,147 L 292,149 L 290,154 L 288,149 L 283,147 L 288,145 Z" fill="#2B211A" fill-opacity="0.4" />
</svg>
